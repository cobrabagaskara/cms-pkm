<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS – Puskesmas Kedawung</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0d6e4f;
  --primary-light: #16a373;
  --primary-pale: #e8f5f0;
  --accent: #f0a500;
  --dark: #0f1f1a;
  --body: #2c3e35;
  --muted: #6b8070;
  --border: #d4e4dc;
  --bg: #f8faf9;
  --card: #ffffff;
  --danger: #c0392b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--body); min-height: 100vh; display: flex; }

/* SIDEBAR */
.sidebar { width: 240px; background: var(--dark); color: white; display: flex; flex-direction: column; min-height: 100vh; position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0; }
.sidebar-brand { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.brand-badge { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.brand-name { font-size: 16px; font-weight: 800; color: white; line-height: 1.2; }
.brand-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; }
.sidebar-nav { flex: 1; padding: 12px 0; }
.nav-group-label { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 12px 20px 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); transition: all 0.15s; border-left: 3px solid transparent; }
.nav-item:hover { color: white; background: rgba(255,255,255,0.06); }
.nav-item.active { color: white; border-left-color: var(--primary-light); background: rgba(13,110,79,0.2); font-weight: 700; }
.nav-item .ni { font-size: 16px; }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; background: white; border-bottom: 1px solid var(--border); gap: 16px; }
.topbar-title { font-size: 18px; font-weight: 800; color: var(--dark); }
.topbar-right { display: flex; gap: 10px; align-items: center; }
.content { flex: 1; padding: 28px; overflow-y: auto; }
.statusbar { padding: 8px 28px; background: var(--bg); border-top: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
.sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.sdot.ok { background: var(--primary); }
.sdot.err { background: var(--danger); }
.sdot.loading { background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 7px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 700; padding: 9px 18px; border: none; cursor: pointer; border-radius: 8px; transition: all 0.15s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-ghost { background: transparent; color: var(--body); border: 1.5px solid var(--border); }
.btn-ghost:hover { border-color: var(--body); }
.btn-danger { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); }
.btn-danger:hover { background: var(--danger); color: white; }
.btn-sm { font-size: 12px; padding: 6px 12px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* CARDS & TABLE */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
.section-title { font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 20px; }
.table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.table th { background: var(--primary); color: white; padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; }
.table td { padding: 13px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: var(--primary-pale); }
.table-actions { display: flex; gap: 6px; }

/* FORM */
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
input[type=text], input[type=date], select, textarea {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px; padding: 10px 14px;
  background: white; border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--body); outline: none;
  transition: border-color 0.15s; width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: var(--primary); }
textarea { resize: vertical; min-height: 200px; line-height: 1.6; font-family: 'DM Mono', monospace; font-size: 13px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.checkbox-row { display: flex; align-items: center; gap: 8px; }
.checkbox-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--primary); }
.checkbox-row label { font-size: 13px; text-transform: none; letter-spacing: 0; color: var(--body); font-weight: 500; }

/* TOOLBAR */
.editor-toolbar { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 14px; background: var(--bg); border: 1.5px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0; }
.editor-toolbar + textarea { border-radius: 0 0 8px 8px; }
.tb-btn { font-size: 11px; font-weight: 700; padding: 4px 10px; background: white; border: 1px solid var(--border); cursor: pointer; border-radius: 5px; color: var(--muted); transition: all 0.15s; }
.tb-btn:hover { background: var(--dark); color: white; border-color: var(--dark); }

/* PANEL */
.panel { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.panel-title { font-size: 16px; font-weight: 800; color: var(--dark); }

/* BADGE */
.badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; }
.badge-penting { background: #fff3cd; color: #856404; }
.badge-biasa { background: var(--bg); color: var(--muted); }

/* TOAST */
.toast-wrap { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
.toast { font-family: 'DM Mono', monospace; font-size: 12px; padding: 12px 18px; background: var(--dark); color: white; border-left: 4px solid var(--primary-light); border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); animation: slideIn 0.3s; max-width: 320px; }
.toast.success { border-left-color: var(--primary); }
.toast.error { border-left-color: var(--danger); }
@keyframes slideIn { from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1} }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(2px); }
.modal { background: white; border-radius: 12px; padding: 28px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
.modal p { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
.stat-num { font-size: 32px; font-weight: 800; color: var(--primary); line-height: 1; }
.stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500; }

.spinner-btn { width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block; }
@keyframes spin{to{transform:rotate(360deg)}}

.empty { text-align: center; padding: 48px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 15px; font-weight: 600; color: var(--dark); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-badge">CMS Panel</div>
    <div class="brand-name">Puskesmas Kedawung</div>
    <div class="brand-sub">cobrabagaskara/cms-pkm</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group-label">Konten</div>
    <div class="nav-item active" onclick="showPanel('dashboard')" id="nav-dashboard"><span class="ni">📊</span> Dashboard</div>
    <div class="nav-item" onclick="showPanel('artikel')" id="nav-artikel"><span class="ni">📝</span> Artikel</div>
    <div class="nav-item" onclick="showPanel('pengumuman')" id="nav-pengumuman"><span class="ni">📢</span> Pengumuman</div>
    <div class="nav-item" onclick="showPanel('jadwal')" id="nav-jadwal"><span class="ni">🗓</span> Jadwal Dokter</div>
    <div class="nav-group-label">Pengaturan</div>
    <div class="nav-item" onclick="showPanel('profil')" id="nav-profil"><span class="ni">🏥</span> Profil Puskesmas</div>
    <div class="nav-group-label">Website</div>
    <div class="nav-item" onclick="window.open('../index.html','_blank')"><span class="ni">🌐</span> Lihat Website</div>
  </nav>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-right" id="topbar-right"></div>
  </div>
  <div class="content" id="main-content">
    <div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Memuat...</div></div>
  </div>
  <div class="statusbar">
    <div class="sdot loading" id="sdot"></div>
    <span id="stext">Menghubungkan ke GitHub API...</span>
  </div>
</div>

<!-- Modal konfirmasi hapus -->
<div class="modal-bg" id="del-modal" style="display:none">
  <div class="modal">
    <h3>Hapus Item?</h3>
    <p id="del-msg">Tindakan ini tidak dapat dibatalkan.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDelModal()">Batal</button>
      <button class="btn btn-danger" onclick="execDelete()">Hapus</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const TOKEN = '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';
const OWNER = 'cobrabagaskara';
const REPO  = 'cms-pkm';
const API   = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;
const RAW   = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main`;

// ── UTILS ────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function setStatus(msg, s='loading') {
  $('stext').textContent = msg;
  $('sdot').className = 'sdot ' + s;
}
function toast(msg, type='info') {
  const w = $('toasts');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
function b64enc(s) { return btoa(unescape(encodeURIComponent(s))); }
function b64dec(s) { try { return decodeURIComponent(escape(atob(s.replace(/\n/g,'')))); } catch(e) { return atob(s.replace(/\n/g,'')); } }
function fmtDate(s) { return new Date(s).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}); }
function gh(method, path, body) {
  return fetch(`${API}/${path}`, {
    method,
    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
}
async function ghGet(path) {
  const r = await fetch(`${RAW}/${path}?t=${Date.now()}`);
  if (!r.ok) throw new Error(`404: ${path}`);
  return r.json();
}
async function ghGetFile(path) {
  const r = await fetch(`${API}/${path}`, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
  if (!r.ok) throw new Error(`404`);
  return r.json();
}
function setNav(id) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  $(id).classList.add('active');
}
function insertMd(ta, b, a) {
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  ta.value = ta.value.substring(0,s) + b + sel + a + ta.value.substring(e);
  ta.focus();
  ta.selectionStart = s + b.length;
  ta.selectionEnd = s + b.length + sel.length;
}

// ── DELETE MODAL ─────────────────────────────────────────
let delTarget = null;
function askDelete(msg, fn) {
  $('del-msg').textContent = msg;
  delTarget = fn;
  $('del-modal').style.display = 'flex';
}
function closeDelModal() { $('del-modal').style.display = 'none'; delTarget = null; }
function execDelete() { closeDelModal(); if (delTarget) delTarget(); }

// ── PANELS ───────────────────────────────────────────────
async function showPanel(panel) {
  setNav('nav-' + panel);
  $('topbar-right').innerHTML = '';
  const panels = { dashboard: showDashboard, artikel: showArtikel, pengumuman: showPengumuman, jadwal: showJadwal, profil: showProfil };
  if (panels[panel]) await panels[panel]();
}

// ── DASHBOARD ────────────────────────────────────────────
async function showDashboard() {
  $('topbar-title').textContent = 'Dashboard';
  $('main-content').innerHTML = `<div class="empty"><div class="empty-icon">⏳</div></div>`;
  setStatus('Memuat data...', 'loading');
  try {
    const [artikel, pengumuman, jadwal] = await Promise.all([
      ghGet('_data/artikel-index.json').catch(() => []),
      ghGet('_data/pengumuman.json').catch(() => []),
      ghGet('_data/jadwal.json').catch(() => []),
    ]);
    setStatus('Terhubung ke GitHub ✓', 'ok');
    $('main-content').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num">${artikel.length}</div><div class="stat-lbl">Artikel</div></div>
        <div class="stat-card"><div class="stat-num">${pengumuman.length}</div><div class="stat-lbl">Pengumuman</div></div>
        <div class="stat-card"><div class="stat-num">${jadwal.length}</div><div class="stat-lbl">Tenaga Medis</div></div>
        <div class="stat-card"><div class="stat-num">${pengumuman.filter(p=>p.penting).length}</div><div class="stat-lbl">Pengumuman Penting</div></div>
      </div>
      <div class="panel" style="margin-bottom:20px;">
        <div class="panel-header"><div class="panel-title">Artikel Terbaru</div><button class="btn btn-primary btn-sm" onclick="showPanel('artikel')">Kelola →</button></div>
        ${artikel.length ? artikel.slice(0,3).map(a=>`<div style="padding:12px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:600;font-size:14px;">${a.judul}</div><div style="font-size:12px;color:var(--muted);">${a.kategori} · ${fmtDate(a.tanggal)}</div></div></div>`).join('') : '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Belum ada artikel</div></div>'}
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Pengumuman Terbaru</div><button class="btn btn-primary btn-sm" onclick="showPanel('pengumuman')">Kelola →</button></div>
        ${pengumuman.length ? pengumuman.slice(0,3).map(p=>`<div style="padding:12px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:600;font-size:14px;">${p.judul}</div><div style="font-size:12px;color:var(--muted);">${fmtDate(p.tanggal)}</div></div><span class="badge ${p.penting?'badge-penting':'badge-biasa'}">${p.penting?'Penting':'Biasa'}</span></div>`).join('') : '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Belum ada pengumuman</div></div>'}
      </div>`;
  } catch(e) {
    setStatus('Error: ' + e.message, 'err');
    toast('Gagal memuat: ' + e.message, 'error');
  }
}

// ── ARTIKEL LIST ─────────────────────────────────────────
async function showArtikel() {
  $('topbar-title').textContent = 'Artikel Kesehatan';
  $('topbar-right').innerHTML = `<button class="btn btn-primary" onclick="showArtikelForm()">+ Artikel Baru</button>`;
  $('main-content').innerHTML = `<div class="empty"><div class="empty-icon">⏳</div></div>`;
  setStatus('Memuat artikel...', 'loading');
  try {
    const list = await ghGet('_data/artikel-index.json').catch(() => []);
    setStatus(`${list.length} artikel`, 'ok');
    if (!list.length) {
      $('main-content').innerHTML = `<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">Belum ada artikel</div><br><button class="btn btn-primary" onclick="showArtikelForm()">+ Buat Artikel Pertama</button></div>`;
      return;
    }
    $('main-content').innerHTML = `
      <table class="table">
        <thead><tr><th>Judul</th><th>Kategori</th><th>Tanggal</th><th>Aksi</th></tr></thead>
        <tbody>
          ${list.map(a => `
            <tr>
              <td style="font-weight:600;max-width:300px;">${a.judul}</td>
              <td><span style="background:var(--primary-pale);color:var(--primary);padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700;">${a.kategori}</span></td>
              <td style="color:var(--muted);font-size:12px;">${fmtDate(a.tanggal)}</td>
              <td><div class="table-actions">
                <button class="btn btn-ghost btn-sm" onclick="editArtikel('${a.slug}')">✏️ Edit</button>
                <button class="btn btn-danger btn-sm" onclick="hapusArtikel('${a.slug}','${a.judul.replace(/'/g,"\\'")}')">🗑</button>
              </div></td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    setStatus('Error: ' + e.message, 'err');
  }
}

// ── ARTIKEL FORM ─────────────────────────────────────────
const KATEGORI_LIST = ['Gizi','Imunisasi','Higienitas','Ibu & Anak','Lansia','Umum','Penyakit','Obat-obatan'];

async function showArtikelForm(data=null, slug=null) {
  $('topbar-title').textContent = data ? 'Edit Artikel' : 'Artikel Baru';
  $('topbar-right').innerHTML = `<button class="btn btn-ghost" onclick="showArtikel()">← Kembali</button>`;
  $('main-content').innerHTML = `
    <div class="panel">
      <div class="form-row">
        <div class="form-group" style="grid-column:1/-1">
          <label>Judul Artikel</label>
          <input type="text" id="f-judul" placeholder="Judul artikel kesehatan..." value="${data?.judul||''}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Kategori</label>
          <select id="f-kat">${KATEGORI_LIST.map(k=>`<option ${data?.kategori===k?'selected':''}>${k}</option>`).join('')}</select>
        </div>
        <div class="form-group">
          <label>Tanggal</label>
          <input type="date" id="f-tgl" value="${data?.tanggal||new Date().toISOString().slice(0,10)}">
        </div>
      </div>
      <div class="form-group">
        <label>Ringkasan (tampil di daftar artikel)</label>
        <input type="text" id="f-ringkasan" placeholder="Ringkasan singkat artikel..." value="${data?.ringkasan||''}">
      </div>
      <div class="form-group">
        <label>URL Gambar (opsional)</label>
        <input type="text" id="f-gambar" placeholder="https://..." value="${data?.gambar||''}">
      </div>
      <div class="form-group">
        <label>Isi Artikel (Markdown)</label>
        <div class="editor-toolbar">
          <button class="tb-btn" onclick="insertMd($('f-isi'),'**','**')"><b>B</b></button>
          <button class="tb-btn" onclick="insertMd($('f-isi'),'*','*')"><i>I</i></button>
          <button class="tb-btn" onclick="insertMd($('f-isi'),'# ','')">H1</button>
          <button class="tb-btn" onclick="insertMd($('f-isi'),'## ','')">H2</button>
          <button class="tb-btn" onclick="insertMd($('f-isi'),'### ','')">H3</button>
          <button class="tb-btn" onclick="insertMd($('f-isi'),'- ','')">List</button>
          <button class="tb-btn" onclick="insertMd($('f-isi'),'1. ','')">Ol</button>
          <button class="tb-btn" onclick="insertMd($('f-isi'),'> ','')">Quote</button>
        </div>
        <textarea id="f-isi" placeholder="Tulis isi artikel dengan Markdown...">${data?.isi||''}</textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn btn-primary" id="f-save-btn" onclick="saveArtikel('${slug||''}')">💾 ${data?'Simpan Perubahan':'Publish Artikel'}</button>
        <button class="btn btn-ghost" onclick="showArtikel()">Batal</button>
      </div>
    </div>`;
}

async function editArtikel(slug) {
  setStatus('Memuat artikel...', 'loading');
  try {
    const data = await ghGet(`_data/artikel/${slug}.json`);
    showArtikelForm(data, slug);
    setStatus('Siap edit', 'ok');
  } catch(e) { toast('Gagal memuat artikel', 'error'); }
}

async function saveArtikel(existingSlug) {
  const judul = $('f-judul').value.trim();
  const kategori = $('f-kat').value;
  const tanggal = $('f-tgl').value;
  const ringkasan = $('f-ringkasan').value.trim();
  const gambar = $('f-gambar').value.trim();
  const isi = $('f-isi').value.trim();
  if (!judul || !isi) { toast('Judul dan isi wajib diisi!', 'error'); return; }

  const btn = $('f-save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-btn"></span> Menyimpan...';
  setStatus('Menyimpan ke GitHub...', 'loading');

  const isNew = !existingSlug;
  const slug = existingSlug || `${String(Date.now()).slice(-6)}-${judul.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40)}`;
  const id = slug.split('-')[0];

  const artikelData = { id, judul, slug, tanggal, kategori, gambar, ringkasan, isi };

  try {
    // 1. Save artikel file
    let sha = null;
    if (!isNew) {
      const f = await ghGetFile(`_data/artikel/${slug}.json`);
      sha = f.sha;
    }
    const r1 = await gh('PUT', `_data/artikel/${slug}.json`, {
      message: isNew ? `Add artikel: ${judul}` : `Update artikel: ${judul}`,
      content: b64enc(JSON.stringify(artikelData, null, 2)),
      ...(sha ? { sha } : {})
    });
    if (!r1.ok) throw new Error(await r1.text());

    // 2. Update artikel-index.json
    let idx = [];
    let idxSha = null;
    try {
      const idxFile = await ghGetFile('_data/artikel-index.json');
      idx = JSON.parse(b64dec(idxFile.content));
      idxSha = idxFile.sha;
    } catch(e) {}
    const entry = { id, slug, judul, tanggal, kategori, gambar, ringkasan };
    const pos = idx.findIndex(a => a.slug === slug);
    if (pos >= 0) idx[pos] = entry; else idx.unshift(entry);
    idx.sort((a,b) => b.tanggal.localeCompare(a.tanggal));
    const r2 = await gh('PUT', '_data/artikel-index.json', {
      message: 'Update artikel-index.json',
      content: b64enc(JSON.stringify(idx, null, 2)),
      ...(idxSha ? { sha: idxSha } : {})
    });
    if (!r2.ok) throw new Error(await r2.text());

    setStatus('Artikel berhasil disimpan ✓', 'ok');
    toast(isNew ? 'Artikel berhasil dipublish!' : 'Artikel berhasil diperbarui!', 'success');
    showArtikel();
  } catch(e) {
    setStatus('Gagal: ' + e.message, 'err');
    toast('Gagal menyimpan: ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '💾 Simpan';
  }
}

async function hapusArtikel(slug, judul) {
  askDelete(`Hapus artikel "${judul}"? Tindakan ini tidak bisa dibatalkan.`, async () => {
    setStatus('Menghapus artikel...', 'loading');
    try {
      // Hapus file artikel
      const f = await ghGetFile(`_data/artikel/${slug}.json`);
      const r = await gh('DELETE', `_data/artikel/${slug}.json`, { message: `Delete artikel: ${slug}`, sha: f.sha });
      if (!r.ok) throw new Error('Gagal hapus file');
      // Update index
      const idxFile = await ghGetFile('_data/artikel-index.json');
      let idx = JSON.parse(b64dec(idxFile.content));
      idx = idx.filter(a => a.slug !== slug);
      await gh('PUT', '_data/artikel-index.json', { message: 'Update artikel-index.json', content: b64enc(JSON.stringify(idx,null,2)), sha: idxFile.sha });
      setStatus('Artikel dihapus ✓', 'ok');
      toast('Artikel berhasil dihapus', 'success');
      showArtikel();
    } catch(e) { setStatus('Gagal: '+e.message,'err'); toast('Gagal hapus: '+e.message,'error'); }
  });
}

  $('main-content').innerHTML = `
    <div class="panel">

        <label>Judul Pengumuman</label>
        <input type="text" id="p-judul" value="${p?.judul||''}" placeholder="Judul pengumuman...">

async function savePengumuman(idx) {
  const judul = $('p-judul').value.trim();
  const tanggal = $('p-tgl').value;
  const isi = $('p-isi').value.trim();
  const penting = $('p-penting').checked;
  if (!judul || !isi) { toast('Judul dan isi wajib diisi!','error'); return; }
  const btn = $('p-save-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-btn"></span> Menyimpan...';
  setStatus('Menyimpan...','loading');
  try {
    let list = [...pengumumanCache];
    const entry = { id: String(Date.now()), judul, tanggal, isi, penting };
    if (idx !== null) list[idx] = { ...list[idx], judul, tanggal, isi, penting };
    else list.unshift(entry);
    const f = await ghGetFile('_data/pengumuman.json');
    await gh('PUT','_data/pengumuman.json',{ message: idx!==null?'Update pengumuman':'Add pengumuman', content: b64enc(JSON.stringify(list,null,2)), sha: f.sha });
    setStatus('Tersimpan ✓','ok');
    toast('Pengumuman berhasil disimpan!','success');
    showPengumuman();
  } catch(e) { setStatus('Gagal: '+e.message,'err'); toast('Gagal: '+e.message,'error'); btn.disabled=false; btn.innerHTML='💾 Simpan'; }
}

async function hapusPengumuman(idx, judul) {
  pengumumanCache = await ghGet('_data/pengumuman.json').catch(()=>[]);
  askDelete(`Hapus pengumuman "${judul}"?`, async () => {
    try {
      const list = pengumumanCache.filter((_,i) => i !== idx);
      const f = await ghGetFile('_data/pengumuman.json');
      await gh('PUT','_data/pengumuman.json',{ message:'Delete pengumuman', content: b64enc(JSON.stringify(list,null,2)), sha: f.sha });
      toast('Pengumuman dihapus','success');
      showPengumuman();
    } catch(e) { toast('Gagal hapus: '+e.message,'error'); }
  });
}

    const f = await ghGetFile('_data/jadwal.json');

    toast('Jadwal disimpan!','success');
