<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontak – Puskesmas Kedawung</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="breadcrumb"><a href="index.html">Beranda</a> / Kontak</div>
    <h1>Hubungi Kami</h1>
    <p>Kami siap membantu. Jangan ragu untuk menghubungi Puskesmas Kedawung.</p>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="kontak-grid" id="kontak-grid">
      <div class="loading-wrap"><div class="spinner"></div> Memuat...</div>
    </div>
  </div>
</section>

<!-- JAM OPERASIONAL -->
<section class="section section-alt">
  <div class="container" style="max-width:600px;">
    <div class="section-header centered">
      <span class="section-eyebrow">Jadwal</span>
      <h2 class="section-title">Jam Operasional</h2>
    </div>
    <div id="jam-grid" style="display:flex;flex-direction:column;gap:12px;">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
    <div class="card mt-32" style="border-left:4px solid var(--primary);text-align:center;">
      <div style="font-size:28px;margin-bottom:8px;">🚨</div>
      <div style="font-weight:700;margin-bottom:4px;">Kedaruratan Medis</div>
      <div style="font-size:14px;color:var(--muted);">Di luar jam operasional, silakan hubungi<br>IGD RSUD Gunung Jati Cirebon</div>
    </div>
  </div>
</section>

<footer id="footer"></footer>

<script src="assets/js/main.js"></script>
<script>
const JAM_DETAIL = [
  { hari: 'Senin – Kamis', jam: '07.30 – 14.00' },
  { hari: 'Jumat', jam: '07.30 – 11.00' },
  { hari: 'Sabtu', jam: '07.30 – 12.00' },
  { hari: 'Minggu & Libur Nasional', jam: 'Tutup' },
];

initPage(async (profil) => {
  document.title = `Kontak – ${profil.nama}`;

  document.getElementById('kontak-grid').innerHTML = `
    <div class="kontak-info">
      <div class="kontak-item">
        <div class="kontak-icon">📍</div>
        <div>
          <div class="kontak-label">Alamat</div>
          <div class="kontak-value">${profil.alamat}</div>
        </div>
      </div>
      <div class="kontak-item">
        <div class="kontak-icon">📞</div>
        <div>
          <div class="kontak-label">Telepon</div>
          <div class="kontak-value"><a href="tel:${profil.telepon}">${profil.telepon}</a></div>
        </div>
      </div>
      <div class="kontak-item">
        <div class="kontak-icon">✉️</div>
        <div>
          <div class="kontak-label">Email</div>
          <div class="kontak-value"><a href="mailto:${profil.email}">${profil.email}</a></div>
        </div>
      </div>
      <div class="kontak-item">
        <div class="kontak-icon">🕐</div>
        <div>
          <div class="kontak-label">Jam Operasional</div>
          <div class="kontak-value" style="font-size:14px;">${profil.jam_operasional}</div>
        </div>
      </div>
    </div>
    <div class="map-placeholder">
      <span style="font-size:40px;">🗺️</span>
      <div style="font-weight:600;">Peta Lokasi</div>
      <div style="font-size:12px;text-align:center;max-width:200px;">${profil.alamat}</div>
      <a href="https://maps.google.com/?q=${encodeURIComponent(profil.alamat)}" target="_blank" class="btn btn-primary" style="margin-top:12px;">Buka di Google Maps →</a>
    </div>`;

  document.getElementById('jam-grid').innerHTML = JAM_DETAIL.map(j => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:white;border:1px solid var(--border);border-radius:10px;">
      <span style="font-weight:600;font-size:14px;">${j.hari}</span>
      <span style="font-size:14px;color:${j.jam === 'Tutup' ? '#c0392b' : 'var(--primary)'};font-weight:600;">${j.jam}</span>
    </div>`).join('');
});
</script>
</body>
</html>
