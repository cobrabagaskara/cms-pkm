<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman – Puskesmas Kedawung</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="breadcrumb"><a href="index.html">Beranda</a> / Pengumuman</div>
    <h1>Pengumuman</h1>
    <p>Informasi terbaru dan pengumuman resmi dari Puskesmas Kedawung.</p>
  </div>
</div>

<section class="section">
  <div class="container" style="max-width:800px;">
    <div id="pengumuman-list" style="display:flex;flex-direction:column;gap:16px;">
      <div class="loading-wrap"><div class="spinner"></div> Memuat pengumuman...</div>
    </div>
  </div>
</section>

<footer id="footer"></footer>

<script src="assets/js/main.js"></script>
<script>
initPage(async (profil) => {
  document.title = `Pengumuman – ${profil.nama}`;
  const pengumuman = await fetchJSON('_data/pengumuman.json');

  if (!pengumuman.length) {
    document.getElementById('pengumuman-list').innerHTML = `
      <div style="text-align:center;padding:60px;color:var(--muted);">
        <div style="font-size:40px;margin-bottom:12px;">📭</div>
        <div style="font-weight:700;">Belum ada pengumuman</div>
      </div>`;
    return;
  }

  document.getElementById('pengumuman-list').innerHTML = pengumuman.map(p => `
    <div class="pengumuman-item ${p.penting ? 'penting' : ''}" style="flex-direction:column;gap:8px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="pengumuman-dot"></div>
        ${p.penting ? '<span style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);background:#fff8e1;padding:2px 8px;border-radius:100px;">Penting</span>' : ''}
      </div>
      <div class="pengumuman-title">${p.judul}</div>
      <div class="pengumuman-isi" style="-webkit-line-clamp:unset;">${p.isi}</div>
      <div class="pengumuman-date">📅 ${formatTanggal(p.tanggal)}</div>
    </div>`).join('');
});
</script>
</body>
</html>
